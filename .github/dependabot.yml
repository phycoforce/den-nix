version: 2
updates:
  # Refresh flake.lock inputs. nixpkgs tracks the nixos-unstable branch, so this
  # refreshes the locked rev rather than bumping a version - same as a manual
  # `nix flake update`. All inputs are grouped into a single weekly PR.
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      flake-inputs:
        patterns: ["*"]
    commit-message:
      prefix: "chore"

  # Keep the SHA-pinned GitHub Actions in .github/workflows/ current. Dependabot
  # bumps both the SHA and the trailing `# vN` comment. A cooldown delays brand-
  # new tags so a compromised/rushed release has time to be caught first.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
